<style>
:root{--olive:#999F4F;--olive-d:#7d8337;--yellow:#F0CF4B;--navy:#313746;--gray:#767C8D;--cream:#F7F5F2;--white:#fff;--line:rgba(49,55,70,.08);--shadow:0 10px 30px rgba(49,55,70,.08);--r:18px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'ProbaPro',system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--cream);color:var(--navy);-webkit-font-smoothing:antialiased;line-height:1.4}
.hdr{position:sticky;top:0;z-index:20;background:rgba(247,245,242,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px}
.dot{width:26px;height:26px;border-radius:50%;background:var(--olive);position:relative;flex:0 0 auto}.dot::after{content:"";position:absolute;inset:7px;border-radius:50%;background:var(--yellow)}
.brand small{display:block;font-weight:500;color:var(--gray);font-size:11px}
.msel{position:relative}select{appearance:none;-webkit-appearance:none;background:var(--navy);color:#fff;border:0;border-radius:999px;padding:10px 38px 10px 16px;font:inherit;font-weight:600;font-size:14px;cursor:pointer}
.msel::after{content:"▾";position:absolute;right:15px;top:50%;transform:translateY(-50%);color:var(--yellow);pointer-events:none}
main{max-width:1180px;margin:0 auto;padding:16px 16px 60px}
.sect-t{font-size:13px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--gray);margin:26px 4px 12px}
.grid{display:grid;grid-template-columns:1fr;gap:12px}

.kpi .lab{font-size:13px;color:var(--gray);font-weight:600}.kpi .val{font-size:28px;font-weight:800;letter-spacing:-.5px;margin:6px 0 2px;font-variant-numeric:tabular-nums}
.kpi .val small{font-size:13px;font-weight:600;color:var(--gray)}.kpi .sub{font-size:12px;color:var(--gray);margin-top:6px}
.pill{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;padding:3px 9px;border-radius:999px;margin-top:8px}
.up{background:rgba(153,159,79,.14);color:var(--olive-d)}.down{background:rgba(224,76,96,.12);color:#c0392b}.flat{background:rgba(118,124,141,.12);color:var(--gray)}
.acc{border-left:4px solid var(--yellow)}.accg{border-left:4px solid var(--olive)}
.chart-card{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
.chart-card h3{font-size:14px;font-weight:700;margin-bottom:10px}
.cwrap{position:relative;height:210px}
.cap{margin-top:10px;font-size:12.5px;color:var(--gray);line-height:1.5;border-top:1px solid var(--line);padding-top:9px}
.cap b{color:var(--navy)}
.pending .card{opacity:.65;border-style:dashed}
.tag{display:inline-block;font-size:10px;font-weight:700;color:var(--olive-d);background:rgba(240,207,75,.25);padding:2px 8px;border-radius:999px;margin-left:6px}
.ft{margin-top:30px;text-align:center;color:var(--gray);font-size:12px;line-height:1.6}
